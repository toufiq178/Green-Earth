<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>



    <!-- daisy ui & tailwind css-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- connect css -->
    <link rel="stylesheet" href="./css/style.css">


</head>

<body class=" space-y-30 bg-color-tertiary">


    <header>

        <!-- navbar section -->
        <nav>
            <div class="navbar bg-color-primary shadow-sm text-white">
                <div class="navbar-start">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>
                        <ul tabindex="-1"
                            class="menu menu-sm dropdown-content  bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow text-color-primary">
                            <li><a>About</a></li>
                            <li><a>Gallery</a></li>
                            <li><a>Plant a Tree</a></li>
                        </ul>
                    </div>
                    <a class="btn btn-ghost text-xl">Green Earth </a>
                </div>
                <div class="navbar-center hidden lg:flex">
                    <ul class="menu menu-horizontal px-1">
                        <li><a>About</a></li>
                        <li><a>Gallery</a></li>
                        <li><a>Plant a Tree</a></li>
                    </ul>
                </div>
                <div class="navbar-end ">
                    <a class="btn btn-warning rounded-full text-color-primary">Plant a Tree</a>
                </div>
            </div>
        </nav>


        <!-- hero section -->

        <section>
            <div class=" bg-color-secondary  grid grid-cols-1   lg:grid-cols-4 justify-between">

                <div class="hidden lg:block col-span-1">
                    <img src="./assets/hero-leaf1.png" alt="">
                </div>

                <div class="hero-content text-center  col-span-2">
                    <div class="max-w-md">
                        <h1 class=" text-xl md:text-5xl font-bold">Plant a Tree, Grow a Future</h1>
                        <p class="py-6">
                            Join our mission to plant 1 million trees and make the Earth greener for future generations.
                        </p>
                        <button class="btn btn-warning rounded-full text-color-primary">Get Involved</button>
                    </div>
                </div>

                <div class="hidden lg:block col-span-1">
                    <img src="./assets/hero-leaf2.png" alt="">
                </div>

            </div>
        </section>
    </header>



    <main>

        <section class="max-w-10/12 mx-auto space-y-10">

            <h1 class="text-3xl font-bold text-center ">Choose Your Trees</h1>


            <div class="grid grid-cols-5 justify-items-center gap-10">

                <!-- categories -->
                <div class="col-span-1 space-y-4  w-full ">
                    <h1 class="font-bold text-xl">Categories</h1>

                    <div class="space-y-3 ">

                        <button class="text-left bg-transparent w-full ">All Tries</button>
                        <div id="categories-Container" class="space-y-5">

                        </div>
                    </div>

                </div>


                <!-- cards -->
                <div id="trees-continer" class="col-span-3  w-full grid grid-cols-3 gap-4">


                    
                </div>


                <!-- cart -->
                <div class="col-span-1  bg-blue-600 w-full">

                    your cart
                </div>

            </div>
        </section>




    </main>





    <!-- js connect -->
    <script src="./js/script.js"></script>

</body>

</html>
